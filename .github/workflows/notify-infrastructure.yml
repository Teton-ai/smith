name: notify-infrastructure

on:
  workflow_run:
    workflows: [api, dashboard]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - name: Get version from tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Check both workflows succeeded
        id: check
        run: |
          TAG="${{ env.TAG }}"
          for WORKFLOW in api dashboard; do
            RESULT=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$WORKFLOW" \
              --json headBranch,conclusion \
              --jq --arg tag "$TAG" \
              '[.[] | select(.headBranch == $tag and .conclusion == "success")] | length')

            if [ "$RESULT" -eq 0 ]; then
              echo "ready=false" >> $GITHUB_OUTPUT
              echo "Waiting for $WORKFLOW to complete for $TAG"
              exit 0
            fi
          done
          echo "ready=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Notify infrastructure
        if: steps.check.outputs.ready == 'true'
        run: |
          gh api repos/Teton-ai/smith-infrastructure/dispatches \
            -f event_type=smith-release \
            -f "client_payload[version]=${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
