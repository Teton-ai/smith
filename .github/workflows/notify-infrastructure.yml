name: notify-infrastructure

on:
  workflow_run:
    workflows: [api, dashboard]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - name: Get version from tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Check both workflows succeeded
        id: check
        run: |
          # Determine which workflow just completed, and check the other
          COMPLETED="${{ github.event.workflow.name }}"
          if [ "$COMPLETED" = "api" ]; then
            OTHER="dashboard"
          else
            OTHER="api"
          fi

          # Check if the other workflow has a successful run for this tag
          RESULT=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "$OTHER" \
            --branch "${{ env.TAG }}" \
            --status success \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // empty')

          if [ "$RESULT" = "success" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "Waiting for $OTHER workflow to complete for ${{ env.TAG }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Notify infrastructure
        if: steps.check.outputs.ready == 'true'
        run: |
          gh api repos/Teton-ai/smith-infrastructure/dispatches \
            -f event_type=smith-release \
            -f "client_payload[version]=${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
