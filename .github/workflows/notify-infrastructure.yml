name: notify-infrastructure

on:
  workflow_run:
    workflows: [api, dashboard]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get version from latest release
        id: version
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          if [ -z "$TAG" ]; then
            echo "No release found"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Check both workflows succeeded
        id: check
        run: |
          COMMIT=$(gh api repos/${{ github.repository }}/git/ref/tags/${{ env.TAG }} --jq '.object.sha')

          for WORKFLOW in api dashboard; do
            RESULT=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$WORKFLOW" \
              --commit "$COMMIT" \
              --status success \
              --limit 1 \
              --json conclusion \
              --jq '.[0].conclusion // empty')

            if [ "$RESULT" != "success" ]; then
              echo "ready=false" >> $GITHUB_OUTPUT
              echo "Waiting for $WORKFLOW workflow to complete for ${{ env.TAG }}"
              exit 0
            fi
          done

          echo "ready=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Notify infrastructure
        if: steps.check.outputs.ready == 'true'
        run: |
          gh api repos/Teton-ai/smith-infrastructure/dispatches \
            -f event_type=smith-release \
            -f "client_payload[version]=${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
