name: notify-infrastructure

on:
  workflow_run:
    workflows: [api, dashboard]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get tag for commit
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          # Find tag pointing to this commit
          TAG=$(gh api "repos/${{ github.repository }}/git/matching-refs/tags/v" \
            --jq "[.[] | select(.object.sha == \"$SHA\")] | .[0].ref // empty")
          TAG="${TAG#refs/tags/}"

          if [ -z "$TAG" ]; then
            echo "No tag found for SHA $SHA, skipping"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "found=true" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Found tag $TAG for SHA $SHA"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Check both workflows succeeded
        if: steps.tag.outputs.found == 'true'
        id: check
        run: |
          TAG="${{ env.TAG }}"
          for WORKFLOW in api dashboard; do
            RESULT=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "$WORKFLOW" \
              --json headBranch,conclusion \
              --jq "[.[] | select(.headBranch == \"$TAG\" and .conclusion == \"success\")] | length")

            if [ "$RESULT" -eq 0 ]; then
              echo "ready=false" >> $GITHUB_OUTPUT
              echo "Waiting for $WORKFLOW to complete for $TAG"
              exit 0
            fi
          done
          echo "ready=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Notify infrastructure
        if: steps.check.outputs.ready == 'true'
        run: |
          gh api repos/Teton-ai/smith-infrastructure/dispatches \
            -f event_type=smith-release \
            -f "client_payload[version]=${{ env.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
