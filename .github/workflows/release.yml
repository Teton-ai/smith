name: release
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine versions
        run: |
          CURRENT_VERSION=$(grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Check for existing release PR
        id: check_pr
        run: |
          PR_NUMBER=$(gh pr list --label release,automated --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "Release PR #$PR_NUMBER already exists; will refresh its body."
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "No existing release PR; will open one."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Draft release notes
        run: |
          NOTES=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="v${NEW_VERSION}" \
            -f target_commitish="main" \
            -f previous_tag_name="v${CURRENT_VERSION}" \
            --jq '.body')

          {
            echo "PR_BODY<<EOF"
            echo "chore(release): v${CURRENT_VERSION} to v${NEW_VERSION}"
            echo
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Refresh existing release PR body
        if: steps.check_pr.outputs.exists == 'true'
        run: |
          printf '%s' "$PR_BODY" | gh pr edit "${{ steps.check_pr.outputs.number }}" --body-file -
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: steps.check_pr.outputs.exists != 'true'

      - name: SQLx offline
        if: steps.check_pr.outputs.exists != 'true'
        run: echo "SQLX_OFFLINE=true" > .env

      - name: Bump version
        if: steps.check_pr.outputs.exists != 'true'
        run: |
          sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
          grep -m 1 'version = ' Cargo.toml

      - name: Check generate lock
        if: steps.check_pr.outputs.exists != 'true'
        run: cargo generate-lockfile

      - name: Create Pull Request
        if: steps.check_pr.outputs.exists != 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          commit-message: "chore(release): v${{ env.NEW_VERSION }}"
          title: "chore(release): v${{ env.NEW_VERSION }}"
          body: ${{ env.PR_BODY }}
          branch: chore/release-v${{ env.NEW_VERSION }}
          base: main
          labels: automated,release
          delete-branch: true
          author: 'teton-bot <bot@teton.ai>'
          committer: 'teton-bot <bot@teton.ai>'

  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version and commit message
        run: |
          VERSION=$(grep -m 1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          COMMIT_MSG=$(git log -1 --pretty=format:%s)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: |
          startsWith(env.COMMIT_MSG, format('chore(release): v', env.VERSION))
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
